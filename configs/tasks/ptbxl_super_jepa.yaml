# PTB-XL — ECG-JEPA용 (500Hz, 2500 samples = 5초)
# PTB-XL 내에서 양성 충분한 라벨 10개 선정 (양성 ≥ 500)
task:
  name: ptbxl_super
  num_classes: 10

data:
  h5_root: ${ECG_DATA_ROOT}/h5/physionet/v2.0
  table_csv: ${ECG_DATA_ROOT}/h5/physionet/v2.0/ptbxl_table.csv
  label_csv: ${ECG_DATA_ROOT}/h5/physionet/v2.0/physionet_labels.csv
  label_cols:
    - is_NSR       # 18,092 (82.9%) Normal Sinus Rhythm
    - is_LAD       #  5,146 (23.6%) Left Axis Deviation
    - is_TAb       #  2,345 (10.7%) T-wave Abnormality
    - is_LAnFB     #  1,626 ( 7.4%) Left Anterior Fascicular Block
    - is_AF        #  1,514 ( 6.9%) Atrial Fibrillation
    - is_IRBBB     #  1,118 ( 5.1%) Incomplete RBBB
    - is_STach     #    826 ( 3.8%) Sinus Tachycardia
    - is_IAVB      #    797 ( 3.6%) 1st Degree AV Block
    - is_SB        #    636 ( 2.9%) Sinus Bradycardia
    - is_LBBB      #    536 ( 2.5%) Left Bundle Branch Block
  target_fs: 500
  target_length: 2500  # 500Hz × 5초
  normalize: false
  batch_size: 64
  num_workers: 8
