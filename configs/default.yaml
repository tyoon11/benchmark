# 기본 학습 설정 (ecg-fm-benchmarking 원본 동일)
train:
  epochs: 100
  lr: 1e-3
  lr_min: 1e-6
  weight_decay: 1e-3
  warmup_epochs: 0          # paper uses const schedule
  lr_schedule: const        # const | cosine | warmup_cos
  discriminative_lr_factor: 0.1
  device: cuda

# 기본 eval_mode
# linear_probe | attention_probe | finetune_linear | finetune_attention
eval_mode: linear_probe

# Head 설정
head:
  dropout: 0.0
  num_heads: 8     # attention head용
  hidden_dim: 256  # mlp head용

# Fold split (ecg-fm-benchmarking 동일 방식)
# strat_fold 컬럼이 table CSV에 있으면 자동 사용
# train = fold < max-1, val = max-1, test = max
fold:
  col: strat_fold        # fold 컬럼명
  auto_split: true       # true면 max_fold 기반 자동 split

# 저장
save_dir: null  # null → ./results/{task_name}_{eval_mode}_{timestamp}
